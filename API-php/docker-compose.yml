services:
  api-php:
    build: .
    image: api-php:latest
    container_name: API-PHP
    ports:
      - "8080:80"
    environment:
      - PYTHONIOENCODING=utf-8
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
