# BillionMail - mail.noaman.cloud
# Admin panel proxied through safe path so users just visit mail.noaman.cloud

server {
    listen 80;
    listen [::]:80;
    server_name mail.noaman.cloud;

    client_max_body_size 100M;

    # Root redirects to admin safe path (transparent to user)
    location = / {
        return 302 /nzaYDxua;
    }

    # Proxy all requests to BillionMail core (port 5678)
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
