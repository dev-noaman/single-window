# BillionMail - mail.noaman.cloud
# Admin panel + RoundCube webmail

server {
    listen 80;
    listen [::]:80;
    server_name mail.noaman.cloud;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    # For initial setup without SSL:
    root /var/www/html;
    index index.php index.html;

    # Increase timeouts for large uploads
    client_max_body_size 100M;
    fastcgi_read_timeout 300;
    proxy_read_timeout 300;

    # Logging
    access_log /var/log/nginx/mail.noaman.cloud.access.log;
    error_log /var/log/nginx/mail.noaman.cloud.error.log;

    # Proxy to BillionMail core container
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }

    # RoundCube webmail (explicit path)
    location /roundcube/ {
        proxy_pass http://127.0.0.1:8090/roundcube/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

