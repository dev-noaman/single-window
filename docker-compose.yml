# Qatar Investor Portal Scrapers - Unified Docker Compose
# All Docker-based services in a single file for consistent deployment
# Host services (PM2): scrape-sw-codes (8084), officernd-api (8087), officernd-bff (8088)

services:
  # ===========================================
  # EXISTING SERVICES (migrated from per-service compose files)
  # ===========================================

  api-scraper:
    build: ./api-scraper
    image: api-scraper:latest
    container_name: API-SCRAPER
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - scrapers-network

  api-cr:
    build: ./API-CR
    image: api-cr:latest
    container_name: API-CR
    ports:
      - "8086:8086"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./API-CR/data:/app/data
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - scrapers-network

  portal:
    build: ./Portal
    image: portal:latest
    container_name: PORTAL
    ports:
      - "8082:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health", "&&", "curl", "-f", "http://localhost/php-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - scrapers-network

  # Google Sheets Scraper - Main scraper (codes fetcher)
  gsheet-scraper:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: SW_GSHEET
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive
      - ./scrape-sw-gsheet/output:/app/output
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    command: python scrape_codes.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - English
  gsheet-scraper-en:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: GSHEET_SCRAPER_EN
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive:ro
      - /tmp:/tmp
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - SCRAPER_LANGUAGE=en
    command: python scrape-EN.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - Arabic
  gsheet-scraper-ar:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: GSHEET_SCRAPER_AR
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive:ro
      - /tmp:/tmp
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - SCRAPER_LANGUAGE=ar
    command: python scrape-AR.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - PHP Web (triggers + progress)
  gsheet-scraper-web:
    image: php:8.2-cli
    container_name: GSHEET_SCRAPER_WEB
    restart: unless-stopped
    working_dir: /app
    user: "0:0"
    volumes:
      - ./scrape-sw-gsheet/trigger-scrape-en.php:/app/trigger-scrape-en.php
      - ./scrape-sw-gsheet/trigger-scrape-ar.php:/app/trigger-scrape-ar.php
      - ./scrape-sw-gsheet/progress-en.php:/app/progress-en.php
      - ./scrape-sw-gsheet/progress-ar.php:/app/progress-ar.php
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /usr/bin/docker:/usr/bin/docker:ro
      - /tmp:/tmp
      - ./scrape-sw-gsheet/drive:/app/drive:ro
    ports:
      - "8085:8000"
    command: php -S 0.0.0.0:8000 -t /app
    networks:
      - scrapers-network

  # ===========================================
  # NEW SERVICES
  # ===========================================

  # Evolution API - Redis cache
  evolution-redis:
    image: redis:latest
    container_name: EVOLUTION-REDIS
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - scrapers-network

  # Evolution API - WhatsApp Business API
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: EVOLUTION-API
    restart: unless-stopped
    ports:
      - "8089:8080"
    depends_on:
      - evolution-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - evolution_instances:/evolution/instances
    env_file:
      - .env
    networks:
      - scrapers-network

  # Portainer - Container Management UI
  portainer:
    image: portainer/portainer-ce:latest
    container_name: PORTAINER
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - scrapers-network

  # ===========================================
  # BILLIONMAIL - Email Server + Marketing Platform
  # Uses its own internal network and PostgreSQL
  # ===========================================

  billionmail-pgsql:
    image: postgres:17.4-alpine
    container_name: pgsql-billionmail
    restart: unless-stopped
    environment:
      POSTGRES_DB: billionmail
      POSTGRES_USER: billionmail
      POSTGRES_PASSWORD: ${BILLIONMAIL_DBPASS:-billionmail}
    volumes:
      - billionmail_postgres:/var/lib/postgresql/data
      - billionmail_pgsocket:/var/run/postgresql
    ports:
      - "127.0.0.1:25432:5432"
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.2

  billionmail-redis:
    image: redis:7.4.2-alpine
    container_name: redis-billionmail
    restart: unless-stopped
    command: redis-server --requirepass ${BILLIONMAIL_REDISPASS:-billionmail}
    volumes:
      - billionmail_redis:/data
    ports:
      - "127.0.0.1:26379:6379"
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.3

  billionmail-rspamd:
    image: billionmail/rspamd:1.2
    container_name: rspamd-billionmail
    restart: unless-stopped
    environment:
      - DBHOST=pgsql-billionmail
      - DBNAME=billionmail
      - DBUSER=billionmail
      - DBPASS=${BILLIONMAIL_DBPASS:-billionmail}
      - REDISHOST=redis-billionmail
      - REDISPASS=${BILLIONMAIL_REDISPASS:-billionmail}
    volumes:
      - billionmail_rspamd:/var/lib/rspamd
      - billionmail_conf:/etc/billionmail
    depends_on:
      - billionmail-pgsql
      - billionmail-redis
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.4

  billionmail-dovecot:
    image: billionmail/dovecot:1.6
    container_name: dovecot-billionmail
    restart: unless-stopped
    ports:
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    environment:
      - DBHOST=pgsql-billionmail
      - DBNAME=billionmail
      - DBUSER=billionmail
      - DBPASS=${BILLIONMAIL_DBPASS:-billionmail}
      - REDISHOST=redis-billionmail
      - REDISPASS=${BILLIONMAIL_REDISPASS:-billionmail}
    volumes:
      - billionmail_vmail:/var/vmail
      - billionmail_conf:/etc/billionmail
      - billionmail_pgsocket:/var/run/postgresql
      - billionmail_rspamd:/var/lib/rspamd
    depends_on:
      - billionmail-pgsql
      - billionmail-redis
      - billionmail-rspamd
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.5

  billionmail-postfix:
    image: billionmail/postfix:1.6
    container_name: postfix-billionmail
    restart: unless-stopped
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
    environment:
      - DBHOST=pgsql-billionmail
      - DBNAME=billionmail
      - DBUSER=billionmail
      - DBPASS=${BILLIONMAIL_DBPASS:-billionmail}
      - REDISHOST=redis-billionmail
      - REDISPASS=${BILLIONMAIL_REDISPASS:-billionmail}
    volumes:
      - billionmail_postfix:/var/lib/postfix
      - billionmail_conf:/etc/billionmail
      - billionmail_pgsocket:/var/run/postgresql
      - billionmail_rspamd:/var/lib/rspamd
    depends_on:
      - billionmail-pgsql
      - billionmail-redis
      - billionmail-rspamd
      - billionmail-dovecot
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.6

  billionmail-roundcube:
    image: roundcube/roundcubemail:1.6.11-fpm-alpine
    container_name: webmail-billionmail
    restart: unless-stopped
    volumes:
      - billionmail_webmail:/var/www/html
      - billionmail_phpsock:/var/run/php
    depends_on:
      - billionmail-pgsql
      - billionmail-dovecot
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.7

  billionmail-core:
    image: billionmail/core:4.9.0
    container_name: BILLIONMAIL-CORE
    restart: unless-stopped
    ports:
      - "8090:80"
      - "8443:443"
    environment:
      - BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME:-noaman.cloud}
      - ADMIN_USERNAME=${BILLIONMAIL_ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${BILLIONMAIL_ADMIN_PASSWORD:-admin}
      - SafePath=${BILLIONMAIL_SAFEPATH:-admin}
      - DBHOST=pgsql-billionmail
      - DBNAME=billionmail
      - DBUSER=billionmail
      - DBPASS=${BILLIONMAIL_DBPASS:-billionmail}
      - REDISHOST=redis-billionmail
      - REDISPASS=${BILLIONMAIL_REDISPASS:-billionmail}
      - TZ=${BILLIONMAIL_TZ:-Asia/Qatar}
    volumes:
      - billionmail_core:/opt/billionmail
      - billionmail_ssl:/etc/nginx/ssl
      - billionmail_ssl_selfsigned:/etc/nginx/ssl/selfsigned
      - billionmail_conf:/etc/billionmail
      - billionmail_logs:/var/log/billionmail
      - billionmail_pgsocket:/var/run/postgresql
      - billionmail_phpsock:/var/run/php
      - ./billionmail/.env:/opt/billionmail/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - billionmail-pgsql
      - billionmail-redis
      - billionmail-rspamd
      - billionmail-dovecot
      - billionmail-postfix
      - billionmail-roundcube
    networks:
      billionmail-network:
        ipv4_address: 172.66.1.8
      scrapers-network:

# ===========================================
# NETWORKS
# ===========================================

networks:
  scrapers-network:
    driver: bridge

  billionmail-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.66.1.0/24

# ===========================================
# VOLUMES
# ===========================================

volumes:
  # Evolution API
  evolution_redis_data:
  evolution_instances:

  # Portainer
  portainer_data:

  # BillionMail
  billionmail_postgres:
  billionmail_pgsocket:
  billionmail_redis:
  billionmail_rspamd:
  billionmail_vmail:
  billionmail_postfix:
  billionmail_webmail:
  billionmail_core:
  billionmail_ssl:
  billionmail_ssl_selfsigned:
  billionmail_conf:
  billionmail_logs:
  billionmail_phpsock:
