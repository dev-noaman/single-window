# Qatar Investor Portal Scrapers - Unified Docker Compose
# All Docker-based services in a single file for consistent deployment
# Host services (PM2): scrape-sw-codes (8084), officernd-api (8087), officernd-bff (8088)

services:
  # ===========================================
  # EXISTING SERVICES (migrated from per-service compose files)
  # ===========================================

  api-scraper:
    build: ./api-scraper
    image: api-scraper:latest
    container_name: API-SCRAPER
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - scrapers-network

  api-cr:
    build: ./API-CR
    image: api-cr:latest
    container_name: API-CR
    ports:
      - "8086:8086"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./API-CR/data:/app/data
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - scrapers-network

  portal:
    build: ./Portal
    image: portal:latest
    container_name: PORTAL
    ports:
      - "8082:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health", "&&", "curl", "-f", "http://localhost/php-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - scrapers-network

  # Google Sheets Scraper - Main scraper (codes fetcher)
  gsheet-scraper:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: SW_GSHEET
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive
      - ./scrape-sw-gsheet/output:/app/output
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    command: python scrape_codes.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - English
  gsheet-scraper-en:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: GSHEET_SCRAPER_EN
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive:ro
      - /tmp:/tmp
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - SCRAPER_LANGUAGE=en
    command: python scrape-EN.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - Arabic
  gsheet-scraper-ar:
    build: ./scrape-sw-gsheet
    image: scraper:latest
    container_name: GSHEET_SCRAPER_AR
    volumes:
      - ./scrape-sw-gsheet/drive:/app/drive:ro
      - /tmp:/tmp
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - SCRAPER_LANGUAGE=ar
    command: python scrape-AR.py
    networks:
      - scrapers-network

  # Google Sheets Scraper - PHP Web (triggers + progress)
  gsheet-scraper-web:
    image: php:8.2-cli
    container_name: GSHEET_SCRAPER_WEB
    restart: unless-stopped
    working_dir: /app
    user: "0:0"
    volumes:
      - ./scrape-sw-gsheet/trigger-scrape-en.php:/app/trigger-scrape-en.php
      - ./scrape-sw-gsheet/trigger-scrape-ar.php:/app/trigger-scrape-ar.php
      - ./scrape-sw-gsheet/progress-en.php:/app/progress-en.php
      - ./scrape-sw-gsheet/progress-ar.php:/app/progress-ar.php
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /usr/bin/docker:/usr/bin/docker:ro
      - /tmp:/tmp
      - ./scrape-sw-gsheet/drive:/app/drive:ro
    ports:
      - "8085:8000"
    command: php -S 0.0.0.0:8000 -t /app
    networks:
      - scrapers-network

  # ===========================================
  # NEW SERVICES
  # ===========================================

  # Evolution API - PostgreSQL database
  evolution-postgres:
    image: postgres:15
    container_name: EVOLUTION-POSTGRES
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution_user
      - POSTGRES_PASSWORD=evolution_pass
      - POSTGRES_DB=evolutiondb
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - scrapers-network

  # Evolution API - Redis cache
  evolution-redis:
    image: redis:latest
    container_name: EVOLUTION-REDIS
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - scrapers-network

  # Evolution API - WhatsApp Business API
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: EVOLUTION-API
    restart: unless-stopped
    ports:
      - "8089:8080"
    depends_on:
      - evolution-redis
      - evolution-postgres
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-https://noaman.cloud/evolution}
      - SERVER_PORT=8080
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution_user:evolution_pass@evolution-postgres:5432/evolutiondb?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/6
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - LOG_LEVEL=ERROR,WARN
    networks:
      - scrapers-network

  # Portainer - Container Management UI
  portainer:
    image: portainer/portainer-ce:latest
    container_name: PORTAINER
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - scrapers-network

  # ===========================================
  # BILLIONMAIL - Installed separately via official installer at /opt/BillionMail
  # See: https://github.com/aaPanel/BillionMail
  # Managed by its own docker-compose.yml, not this file
  # ===========================================

# ===========================================
# NETWORKS
# ===========================================

networks:
  scrapers-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================

volumes:
  # Evolution API
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:

  # Portainer
  portainer_data:
