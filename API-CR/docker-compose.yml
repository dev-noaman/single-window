services:
  api-cr:
    build: .
    container_name: API-CR
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      # Mount data directory for credentials and caches
      - ./data:/app/data
    # Increase shared memory for Playwright/Chromium
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
