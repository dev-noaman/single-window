name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          command_timeout: 25m
          script: |
            set -e
            REPO_DIR="/root/scrapers"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/dev-noaman/single.git"

            echo "=========================================="
            echo "  Deploying to VPS"
            echo "=========================================="

            # --- Clone or pull the repo ---
            if [ -d "$REPO_DIR/.git" ]; then
              echo "[*] Pulling latest code..."
              cd "$REPO_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "[*] Cloning repository..."
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            echo "[OK] Code is up to date"

            # --- Docker services ---
            DOCKER_SERVICES=("API-php" "API-node" "API-CR" "Portal" "scrape-sw-codes" "scrape-sw-gsheet")

            # Remove stale files that git won't clean (gitignored but present on disk)
            rm -f "$REPO_DIR/Portal/index.html"

            for svc in "${DOCKER_SERVICES[@]}"; do
              if [ -f "$REPO_DIR/$svc/docker-compose.yml" ]; then
                echo ""
                echo "[*] Deploying $svc..."
                cd "$REPO_DIR/$svc"
                docker compose down --remove-orphans 2>/dev/null || true
                # Remove old image to prevent stale layers
                docker rmi -f $(docker compose config --images 2>/dev/null) 2>/dev/null || true
                docker compose build --no-cache --quiet
                docker compose up -d
                echo "[OK] $svc deployed"
              else
                echo "[SKIP] $svc - no docker-compose.yml"
              fi
            done

            # --- Host service: officernd-api (Python + PM2) ---
            echo ""
            echo "[*] Deploying officernd-api..."
            cd "$REPO_DIR/officernd"

            # Preserve .env (don't overwrite production config)
            if [ ! -f config/.env ]; then
              echo "[WARN] officernd config/.env not found - create it manually"
            else
              # Fix host.docker.internal for host services
              sed -i 's/host\.docker\.internal/localhost/g' config/.env
            fi

            # Install Python dependencies
            if [ -f config/requirements.txt ]; then
              pip3 install --break-system-packages -q -r config/requirements.txt 2>&1 | tail -3
            fi

            # Auto-migrate database
            if [ -f "$REPO_DIR/scripts/setup-databases.py" ]; then
              python3 "$REPO_DIR/scripts/setup-databases.py" "$REPO_DIR/officernd" 2>&1 || echo "[WARN] DB setup had warnings (tables may exist)"
            fi

            # Restart PM2 process
            pm2 delete officernd-api 2>/dev/null || true
            pm2 start "uvicorn api.main:app --host 0.0.0.0 --port 8087" --name officernd-api
            echo "[OK] officernd-api deployed"

            # --- Host service: officernd-bff (NestJS + React + PM2) ---
            echo ""
            echo "[*] Deploying officernd-bff..."
            cd "$REPO_DIR/officernd/bff"

            # Preserve .env
            if [ ! -f .env ]; then
              printf 'OFFICERND_API_URL=http://localhost:8087\nOFFICERND_ORG_SLUG=arafat-business-centers\nPORT=8088\n' > .env
              echo "[INFO] Created default .env for officernd-bff"
            fi

            # Install and build
            npm install --loglevel=error --no-audit --no-fund 2>&1 | tail -3
            cd frontend && npm install --loglevel=error --no-audit --no-fund 2>&1 | tail -3 && npm run build && cd ..
            npm run build

            # Restart PM2 process
            pm2 delete officernd-bff 2>/dev/null || true
            pm2 start dist/main.js --name officernd-bff
            echo "[OK] officernd-bff deployed"

            # --- Save PM2 process list ---
            pm2 save

            # --- Nginx reload ---
            if [ -f "$REPO_DIR/Portal/noaman.cloud.nginx.conf" ]; then
              cp "$REPO_DIR/Portal/noaman.cloud.nginx.conf" /etc/nginx/sites-available/noaman.cloud
              nginx -t 2>&1 && systemctl reload nginx && echo "[OK] Nginx reloaded" || echo "[WARN] Nginx config test failed"
            fi

            # --- Cleanup ---
            docker system prune -f --volumes 2>/dev/null || true

            echo ""
            echo "=========================================="
            echo "  Deployment complete!"
            echo "=========================================="
            echo "  Docker: docker ps"
            echo "  PM2:    pm2 list"
            echo "=========================================="
