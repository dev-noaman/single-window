name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          command_timeout: 90m
          request_pty: true
          script: |
            set -e
            export PATH="$PATH:/usr/bin:/usr/local/bin:/snap/bin"
            trap 'echo "[FATAL] Deploy failed near line (check above for last [OK] or [*])"; exit 1' ERR
            REPO_DIR="/root/scrapers"
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dev-noaman/single-window.git"
            export GIT_TERMINAL_PROMPT=0

            echo "=========================================="
            echo "  Deploying to VPS"
            echo "=========================================="

            # --- Ensure Docker is installed ---
            if ! command -v docker &>/dev/null; then
              echo "[*] Docker not found, installing..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq ca-certificates curl gnupg
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable docker
              systemctl start docker
              echo "[OK] Docker installed: $(docker --version)"
            else
              echo "[OK] Docker found: $(docker --version)"
            fi

            # Verify docker compose plugin
            if ! docker compose version &>/dev/null; then
              echo "[FATAL] docker compose plugin not available"
              exit 1
            fi
            echo "[OK] Docker Compose: $(docker compose version --short)"

            # --- Ensure host dependencies (Python, Node.js, PM2, nginx, PostgreSQL) ---
            export DEBIAN_FRONTEND=noninteractive
            NEED_APT=false

            if ! command -v pip3 &>/dev/null; then
              echo "[*] pip3 not found, will install..."
              NEED_APT=true
            fi
            if ! command -v node &>/dev/null; then
              echo "[*] Node.js not found, will install..."
              NEED_APT=true
            fi
            if ! command -v nginx &>/dev/null; then
              echo "[*] nginx not found, will install..."
              NEED_APT=true
            fi
            if ! command -v psql &>/dev/null; then
              echo "[*] PostgreSQL not found, will install..."
              NEED_APT=true
            fi

            if [ "$NEED_APT" = true ]; then
              apt-get update -qq
            fi

            # Python3 + pip
            if ! command -v pip3 &>/dev/null; then
              apt-get install -y -qq python3-pip python3-venv
              echo "[OK] pip3 installed: $(pip3 --version)"
            else
              echo "[OK] pip3 found"
            fi

            # Node.js 20 LTS + npm
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y -qq nodejs
              echo "[OK] Node.js installed: $(node --version)"
            else
              echo "[OK] Node.js found: $(node --version)"
            fi

            # PM2 (global)
            if ! command -v pm2 &>/dev/null; then
              npm install -g pm2
              echo "[OK] PM2 installed: $(pm2 --version)"
            else
              echo "[OK] PM2 found: $(pm2 --version)"
            fi

            # nginx
            if ! command -v nginx &>/dev/null; then
              apt-get install -y -qq nginx
              systemctl enable nginx
              systemctl start nginx
              echo "[OK] nginx installed"
            else
              echo "[OK] nginx found"
            fi

            # PostgreSQL
            if ! command -v psql &>/dev/null; then
              apt-get install -y -qq postgresql postgresql-contrib
              systemctl enable postgresql
              systemctl start postgresql
              echo "[OK] PostgreSQL installed"
            else
              echo "[OK] PostgreSQL found"
            fi

            # --- Clone or pull the repo ---
            if [ -d "$REPO_DIR/.git" ]; then
              echo "[*] Pulling latest code..."
              cd "$REPO_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              echo "[*] Cloning repository..."
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            echo "[OK] Code is up to date"

            # --- Force correct Portal files (VPS had stale files git couldn't fix) ---
            echo "[*] Writing Portal files directly..."
            rm -rf "$REPO_DIR/Portal"
            mkdir -p "$REPO_DIR/Portal"

            # Write the correct Dockerfile (PHP-FPM based)
            cat > "$REPO_DIR/Portal/Dockerfile" << 'DOCKERFILE'
            FROM php:8.4-fpm

            # Install system dependencies
            RUN apt-get update && apt-get install -y --no-install-recommends \
                nginx \
                curl \
                ca-certificates \
                && rm -rf /var/lib/apt/lists/*

            # Set working directory
            WORKDIR /var/www/html

            # Copy application files
            COPY index.php /var/www/html/index.php
            COPY php-health.php /var/www/html/php-health.php

            # Copy Nginx configuration
            COPY nginx.conf /etc/nginx/sites-available/default

            # Create PHP-FPM socket directory and set permissions
            RUN mkdir -p /run/php \
                && chown -R www-data:www-data /run/php \
                && chmod 755 /run/php

            # Configure PHP-FPM to use socket
            RUN echo '[www]' > /usr/local/etc/php-fpm.d/www.conf \
                && echo 'user = www-data' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'group = www-data' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'listen = /run/php/php-fpm.sock' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'listen.owner = www-data' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'listen.group = www-data' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'listen.mode = 0660' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'pm = dynamic' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'pm.max_children = 5' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'pm.start_servers = 2' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'pm.min_spare_servers = 1' >> /usr/local/etc/php-fpm.d/www.conf \
                && echo 'pm.max_spare_servers = 3' >> /usr/local/etc/php-fpm.d/www.conf

            # Remove any non-PHP index files (ensure terminal-style index.php is the only landing page)
            RUN rm -f /var/www/html/index.html

            # Set permissions
            RUN chown -R www-data:www-data /var/www/html

            # Expose port
            EXPOSE 80

            # Copy the entrypoint script and fix Windows line endings
            COPY docker-entrypoint.sh /docker-entrypoint.sh
            RUN sed -i 's/\r$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh

            CMD ["/docker-entrypoint.sh"]
            DOCKERFILE

            # Remove leading whitespace from heredoc
            sed -i 's/^            //' "$REPO_DIR/Portal/Dockerfile"

            # Restore remaining Portal files from git (now pulling from correct repo)
            cd "$REPO_DIR"
            git checkout -- Portal/index.php Portal/php-health.php Portal/nginx.conf Portal/docker-entrypoint.sh Portal/docker-compose.yml Portal/noaman.cloud.nginx.conf
            git checkout -- Portal/.dockerignore 2>/dev/null || true

            echo "[DEBUG] Portal/Dockerfile first line: $(head -1 $REPO_DIR/Portal/Dockerfile)"
            echo "[DEBUG] Portal files:"
            ls -la "$REPO_DIR/Portal/"
            echo "[OK] Portal files ready"

            # --- Generate .env from secrets (if not already present) ---
            echo "[*] Checking .env file..."
            if [ ! -f "$REPO_DIR/.env" ]; then
              echo "[*] Creating .env from .env.example..."
              cp "$REPO_DIR/.env.example" "$REPO_DIR/.env"
              echo "[WARN] .env created from template — update with real values before first use"
            fi
            # Fix stale Evolution API env vars from old .env.example
            if grep -q "your-password" "$REPO_DIR/.env" 2>/dev/null; then
              sed -i 's|EVOLUTION_DATABASE_URI=.*|EVOLUTION_DATABASE_URI=postgresql://evolution_user:evolution_pass@host.docker.internal:5432/evolutiondb?schema=public|' "$REPO_DIR/.env"
              echo "[OK] Fixed stale Evolution API URI in .env"
            fi
            echo "[OK] .env file present"

            # BillionMail is installed separately at /opt/BillionMail (see below)

            # --- Create Evolution API database on host PostgreSQL ---
            echo ""
            echo "[*] Setting up Evolution API database..."
            if command -v psql &>/dev/null; then
              sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='evolution_user'" | grep -q 1 \
                || sudo -u postgres psql -c "CREATE USER evolution_user WITH PASSWORD 'evolution_pass';" 2>/dev/null
              # Always reset password in case it was created with wrong one
              sudo -u postgres psql -c "ALTER USER evolution_user WITH PASSWORD 'evolution_pass';" 2>/dev/null || true
              sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='evolutiondb'" | grep -q 1 \
                || sudo -u postgres psql -c "CREATE DATABASE evolutiondb OWNER evolution_user;" 2>/dev/null
              sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE evolutiondb TO evolution_user;" 2>/dev/null || true

              # Allow Docker containers to connect via host.docker.internal
              PG_HBA=$(sudo -u postgres psql -tc "SHOW hba_file" | xargs)
              PG_CONF=$(sudo -u postgres psql -tc "SHOW config_file" | xargs)
              PG_CHANGED=false
              if [ -n "$PG_HBA" ] && ! grep -q "172.0.0.0/8" "$PG_HBA" 2>/dev/null; then
                echo "# Allow Docker containers" >> "$PG_HBA"
                echo "host    all    all    172.0.0.0/8    md5" >> "$PG_HBA"
                PG_CHANGED=true
                echo "[OK] PostgreSQL pg_hba updated for Docker access"
              fi
              # Ensure PostgreSQL listens on all interfaces (for host.docker.internal)
              if [ -n "$PG_CONF" ] && ! grep -q "listen_addresses = '\*'" "$PG_CONF" 2>/dev/null; then
                sed -i "s/^#\?listen_addresses.*/listen_addresses = '*'/" "$PG_CONF"
                PG_CHANGED=true
                echo "[OK] PostgreSQL listen_addresses set to *"
              fi
              # Always restart PostgreSQL to ensure config is applied
              systemctl restart postgresql
              sleep 2
              echo "[OK] PostgreSQL restarted"
              # Verify PostgreSQL is accepting connections on all interfaces
              PG_LISTEN=$(sudo -u postgres psql -tc "SHOW listen_addresses" | xargs)
              echo "[DEBUG] PostgreSQL listen_addresses: $PG_LISTEN"
              ss -tlnp | grep 5432 || echo "[WARN] PostgreSQL not listening on 5432"

              echo "[OK] Evolution API database ready"

              # --- Create sw-codes database (codesdb) ---
              echo "[*] Setting up sw-codes database..."
              sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='codesuser'" | grep -q 1 \
                || sudo -u postgres psql -c "CREATE USER codesuser WITH PASSWORD 'CodesPass2024';" 2>/dev/null
              sudo -u postgres psql -c "ALTER USER codesuser WITH PASSWORD 'CodesPass2024';" 2>/dev/null || true
              sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='codesdb'" | grep -q 1 \
                || sudo -u postgres psql -c "CREATE DATABASE codesdb OWNER codesuser;" 2>/dev/null
              sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE codesdb TO codesuser;" 2>/dev/null || true
              # Run init.sql to create tables
              if [ -f "$REPO_DIR/scrape-sw-codes/init.sql" ]; then
                PGPASSWORD=CodesPass2024 psql -h localhost -U codesuser -d codesdb -f "$REPO_DIR/scrape-sw-codes/init.sql" 2>/dev/null || true
                echo "[OK] sw-codes database and tables ready"
              fi
            else
              echo "[WARN] psql not available — databases not created"
            fi

            # --- Docker services (unified compose) ---
            echo ""
            echo "[*] Deploying all Docker services via root docker-compose.yml..."
            cd "$REPO_DIR"

            # Remove legacy containers from pre-refactor era
            docker rm -f API-PHP API-NODE 2>/dev/null || true

            # Stop all services from root compose
            docker compose down --remove-orphans 2>/dev/null || true

            # Force remove any leftover containers by name (excludes BillionMail — managed separately)
            for cn in API-SCRAPER API-CR PORTAL SW_GSHEET GSHEET_SCRAPER_EN GSHEET_SCRAPER_AR GSHEET_SCRAPER_WEB EVOLUTION-API EVOLUTION-REDIS PORTAINER; do
              docker rm -f "$cn" 2>/dev/null || true
            done

            # Also stop any per-service compose that might still be running
            for svc in api-scraper API-CR Portal scrape-sw-gsheet; do
              if [ -f "$REPO_DIR/$svc/docker-compose.yml" ]; then
                cd "$REPO_DIR/$svc"
                docker compose down --remove-orphans 2>/dev/null || true
                cd "$REPO_DIR"
              fi
            done

            # Build and start all services
            docker compose build --no-cache --quiet || { echo "[FATAL] docker compose build failed"; exit 1; }
            # Start detached — redirect all output to avoid ssh-action treating container logs as errors
            docker compose up -d --force-recreate > /tmp/compose-up.log 2>&1 || true
            cat /tmp/compose-up.log || true
            # Verify at least the core services started
            sleep 10
            RUNNING=$(docker ps --filter "status=running" -q | wc -l)
            if [ "$RUNNING" -lt 5 ]; then
              echo "[FATAL] Only $RUNNING containers running, expected at least 5"
              docker ps -a --format "table {{.Names}}\t{{.Status}}" 2>/dev/null
              exit 1
            fi
            echo "[OK] $RUNNING containers running"

            # Verify Portal container content
            echo "[DEBUG] Portal container check:"
            docker exec PORTAL ls /var/www/html/ 2>/dev/null || echo "[DEBUG] /var/www/html not found"
            docker exec PORTAL cat /etc/nginx/sites-available/default 2>/dev/null | head -3 || echo "[DEBUG] no nginx config"

            echo "[OK] All Docker services deployed"

            # --- BillionMail (official install at /opt/BillionMail) ---
            echo ""
            echo "[*] Setting up BillionMail..."
            BMDIR="/opt/BillionMail"

            # Clean up old BillionMail containers/networks from previous custom compose
            for cn in BILLIONMAIL-CORE pgsql-billionmail redis-billionmail rspamd-billionmail dovecot-billionmail postfix-billionmail webmail-billionmail; do
              docker rm -f "$cn" 2>/dev/null || true
            done
            # Remove old overlapping networks
            docker network rm scrapers_billionmail-network 2>/dev/null || true
            docker network rm single_window_adel_billionmail-network 2>/dev/null || true
            docker network ls --filter "name=billionmail" -q | xargs -r docker network rm 2>/dev/null || true

            if [ ! -f "$BMDIR/.installed" ]; then
              echo "[*] Installing BillionMail from official repo..."
              rm -rf "$BMDIR"
              cd /opt
              git clone https://github.com/aaPanel/BillionMail
              cd "$BMDIR"
              bash install.sh
              touch "$BMDIR/.installed"
              echo "[OK] BillionMail installed"
            else
              echo "[*] BillionMail already installed, updating..."
              cd "$BMDIR"
              git pull origin main 2>/dev/null || git pull 2>/dev/null || true
              docker compose up -d 2>&1 || docker-compose up -d 2>&1 || true
              echo "[OK] BillionMail updated"
            fi
            # Fix port 443 conflict: BillionMail binds 443 which steals Cloudflare HTTPS traffic
            # Change 443->8443 so host nginx keeps control of HTTPS via Cloudflare
            if [ -f "$BMDIR/docker-compose.yml" ]; then
              if grep -q '"443:443"' "$BMDIR/docker-compose.yml" 2>/dev/null || grep -q "'443:443'" "$BMDIR/docker-compose.yml" 2>/dev/null; then
                sed -i 's/443:443/8443:443/g' "$BMDIR/docker-compose.yml"
                cd "$BMDIR"
                docker compose up -d 2>&1 || docker-compose up -d 2>&1 || true
                echo "[OK] BillionMail port 443 remapped to 8443"
              fi
            fi
            # Check if BillionMail core is running
            sleep 5
            if docker ps --filter "name=billionmail" --format '{{.Names}}' 2>/dev/null | grep -q .; then
              echo "[OK] BillionMail containers running:"
              docker ps --filter "name=billionmail" --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || true
            else
              echo "[WARN] No BillionMail containers found"
            fi

            # --- Evolution API health check ---
            echo ""
            echo "[*] Checking Evolution API health..."
            EVOL_OK=false
            for i in 1 2 3 4 5 6; do
              if curl -sf http://127.0.0.1:8089/ > /dev/null 2>&1; then
                echo "[OK] Evolution API is healthy (attempt $i)"
                EVOL_OK=true
                break
              fi
              echo "[*] Evolution API not ready yet (attempt $i/6), waiting 10s..."
              sleep 10
            done
            if [ "$EVOL_OK" = false ]; then
              echo "[WARN] Evolution API failed to start. Container state:"
              docker inspect EVOLUTION-API --format '{{.State.Status}} (ExitCode={{.State.ExitCode}}, Restarting={{.State.Restarting}})' 2>/dev/null || true
              echo "[DEBUG] Evolution API logs (last 30 lines):"
              docker logs EVOLUTION-API --tail=30 2>&1 || true
              echo "[DEBUG] Evolution API env check:"
              docker exec EVOLUTION-API printenv DATABASE_PROVIDER 2>/dev/null || echo "  (container not running)"
              docker exec EVOLUTION-API printenv DATABASE_CONNECTION_URI 2>/dev/null | sed 's/:.*@/:***@/' || true
            fi

            # --- Container health summary ---
            echo ""
            echo "[*] Container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || true

            # --- Host service: scrape-sw-codes (PHP + Python, no Docker) ---
            echo ""
            echo "[*] Deploying scrape-sw-codes (host)..."
            cd "$REPO_DIR/scrape-sw-codes"

            echo "[*] Killing stale processes..."
            # Exclude our own PID ($$) — pkill -f would match the deploy script and kill it
            MY_PID=$$
            for pid in $(pgrep -f 'discover_codes\.py' 2>/dev/null); do [ "$pid" != "$MY_PID" ] && kill -TERM "$pid" 2>/dev/null; done || true
            for pid in $(pgrep -f 'fetch_codes_php' 2>/dev/null); do [ "$pid" != "$MY_PID" ] && kill -TERM "$pid" 2>/dev/null; done || true
            rm -f /tmp/fetch_progress.json 2>/dev/null || true
            rm -f "$REPO_DIR/scrape-sw-codes/trigger-fetch-codes2.php" "$REPO_DIR/scrape-sw-codes/discover_codes2.py" 2>/dev/null || true

            echo "[*] Stopping old Docker containers..."
            docker compose down --remove-orphans 2>/dev/null || true
            docker rm -f SW_CODES_PYTHON SW_CODES_WEB SW_CODES_CRON 2>/dev/null || true

            echo "[*] Installing PHP + PostgreSQL..."
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq php-cli php-pgsql 2>/dev/null \
              || apt-get install -y -qq php php-pgsql 2>/dev/null \
              || echo "[WARN] PHP install issue — check-update.php may fail"
            php -m 2>/dev/null | grep -qi pgsql && echo "[OK] php-pgsql loaded" || echo "[WARN] php-pgsql not loaded"

            echo "[*] Installing Python dependencies (httpx, asyncpg)..."
            pip3 install --break-system-packages -q httpx asyncpg 2>&1 | tail -3

            # PM2: serve PHP files on port 8084
            pm2 delete sw-codes-web 2>/dev/null || true
            pm2 start "php -S 0.0.0.0:8084 -t $REPO_DIR/scrape-sw-codes" --name sw-codes-web
            echo "[OK] sw-codes-web on port 8084"

            # Host crontab: hourly smart sync (Qatar time GMT+3)
            chmod +x "$REPO_DIR/scrape-sw-codes/cron-scheduler.sh"
            (crontab -l 2>/dev/null | grep -v 'sw-codes-cron' ; echo "0 * * * * TZ=Asia/Qatar $REPO_DIR/scrape-sw-codes/cron-scheduler.sh >> /var/log/sw-codes-cron.log 2>&1 # sw-codes-cron") | crontab -
            echo "[OK] scrape-sw-codes deployed (host)"

            # --- Host service: officernd (optional - continue on error so fetch-codes always deploys) ---
            set +e
            echo ""
            echo "[*] Deploying officernd-api..."
            cd "$REPO_DIR/officernd" 2>/dev/null && (
              [ -f config/.env ] && sed -i 's/host\.docker\.internal/localhost/g' config/.env
              # Use venv to avoid system pip conflicts (urllib3 etc.)
              if [ ! -d ".venv" ]; then
                python3 -m venv .venv
                echo "[OK] Created officernd venv"
              fi
              .venv/bin/pip install -q -r config/requirements.txt 2>&1 | tail -5
              [ -f "$REPO_DIR/scripts/setup-databases.py" ] && .venv/bin/python "$REPO_DIR/scripts/setup-databases.py" "$REPO_DIR/officernd" 2>&1 || true
              pm2 delete officernd-api 2>/dev/null || true
              pm2 start .venv/bin/uvicorn --name officernd-api --cwd "$REPO_DIR/officernd" -- api.main:app --host 0.0.0.0 --port 8087
              echo "[OK] officernd-api deployed"
            ) || echo "[WARN] officernd-api skipped/failed"
            echo "[*] Deploying officernd-bff..."
            cd "$REPO_DIR/officernd/bff" 2>/dev/null && (
              [ ! -f .env ] && printf 'OFFICERND_API_URL=http://localhost:8087\nPORT=8088\n' > .env
              npm install --loglevel=error --no-audit --no-fund 2>&1 | tail -2
              (cd frontend && npm install --loglevel=error --no-audit --no-fund 2>&1 | tail -2 && npm run build) && npm run build
              pm2 delete officernd-bff 2>/dev/null || true
              pm2 start dist/main.js --name officernd-bff
              echo "[OK] officernd-bff deployed"
            ) || echo "[WARN] officernd-bff skipped/failed"
            set -e
            pm2 save 2>/dev/null || true

            # --- Nginx reload ---
            echo ""
            echo "[*] Reloading nginx..."
            # Remove default nginx site (conflicts with noaman.cloud default_server)
            rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            if [ -f "$REPO_DIR/Portal/noaman.cloud.nginx.conf" ]; then
              cp "$REPO_DIR/Portal/noaman.cloud.nginx.conf" /etc/nginx/sites-available/noaman.cloud
              ln -sf /etc/nginx/sites-available/noaman.cloud /etc/nginx/sites-enabled/noaman.cloud 2>/dev/null || true
              echo "[OK] noaman.cloud config copied + enabled"
            fi
            if [ -f "$REPO_DIR/billionmail/mail.noaman.cloud.nginx.conf" ]; then
              cp "$REPO_DIR/billionmail/mail.noaman.cloud.nginx.conf" /etc/nginx/sites-available/mail.noaman.cloud
              ln -sf /etc/nginx/sites-available/mail.noaman.cloud /etc/nginx/sites-enabled/mail.noaman.cloud 2>/dev/null || true
              echo "[OK] mail.noaman.cloud config copied"
            fi
            nginx -t 2>&1 && systemctl reload nginx && echo "[OK] Nginx reloaded" || echo "[WARN] Nginx config test failed"

            # --- Cleanup ---
            docker image prune -f 2>/dev/null || true

            echo ""
            echo "=========================================="
            echo "  Deployment complete!"
            echo "=========================================="
            echo "  Docker: docker ps"
            echo "  PM2:    pm2 list"
            echo "=========================================="
