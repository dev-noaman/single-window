services:
  api-node:
    build: .
    image: api-node:latest
    container_name: API-NODE
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=false
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    shm_size: '2gb'
    volumes:
      # Optional: Mount logs directory if you want persistent logs
      - ./logs:/app/logs
    networks:
      - scraper-network

networks:
  scraper-network:
    driver: bridge