# cr.noaman.cloud - API-CR direct (bypass Cloudflare proxy to avoid 524 timeout)
# DNS: A record to VPS IP with GREY cloud (DNS only) in Cloudflare
# Run once on VPS: certbot certonly --webroot -w /var/www/html -d cr.noaman.cloud
server {
    listen 80;
    server_name cr.noaman.cloud;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
server {
    listen 443 ssl;
    server_name cr.noaman.cloud;
    ssl_certificate /etc/letsencrypt/live/cr.noaman.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cr.noaman.cloud/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }
}
