server {
    listen 80 default_server;
    server_name noaman.cloud www.noaman.cloud;

    # Portal (Main Interface) -> 8082
    location / {
        proxy_pass http://127.0.0.1:8082/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # api-scraper (consolidated Python scraper) -> 8080
    location /api-scraper/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # API-CR (Company Search & Certificate Download) -> 8086
    location /api-cr/ {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # SW-Codes (trigger endpoint) -> 8084
    location /sw-codes/ {
        proxy_pass http://127.0.0.1:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # GSheet-Scraper (trigger and progress endpoints) -> 8085
    location /gsheet-scraper/ {
        proxy_pass http://127.0.0.1:8085/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # OfficeRnD Web UI -> 8088
    location /officernd/ {
        proxy_pass http://127.0.0.1:8088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # OfficeRnD API -> 8087
    location /officernd-api/ {
        proxy_pass http://127.0.0.1:8087/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    # Evolution API - redirect /evolution and /evolution/ to Manager UI (browser only)
    # Uses $http_accept to distinguish browser requests (text/html) from API calls (json)
    location = /evolution {
        return 302 https://$host/manager/;
    }
    location = /evolution/ {
        if ($http_accept ~* "text/html") {
            return 302 https://$host/manager/;
        }
        proxy_pass http://127.0.0.1:8089/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Evolution API (WhatsApp Business API) -> 8089
    location /evolution/ {
        proxy_pass http://127.0.0.1:8089/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Evolution API Manager UI (also accessible at /manager/ for Vite SPA routing)
    location /manager/ {
        proxy_pass http://127.0.0.1:8089/manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300;
        # Auto-fill login form with server URL and API key
        sub_filter_once on;
        sub_filter '</head>' '<script>document.addEventListener("DOMContentLoaded",function(){var i=setInterval(function(){var u=document.querySelector("input[placeholder*=Server]"),k=document.querySelector("input[placeholder*=API]");if(u&&k){clearInterval(i);var s=Object.getOwnPropertyDescriptor(HTMLInputElement.prototype,"value").set;s.call(u,"https://noaman.cloud/evolution");u.dispatchEvent(new Event("input",{bubbles:true}));s.call(k,"Swa@Adel2022");k.dispatchEvent(new Event("input",{bubbles:true}))}},200)});</script></head>';
    }

    # Evolution API Manager assets (Vite build outputs loaded from /assets/)
    location /assets/ {
        proxy_pass http://127.0.0.1:8089/assets/;
        proxy_set_header Host $host;
    }

    # Portainer (Container Management UI) -> 9000
    # Trailing slash on proxy_pass strips /portainer/ prefix
    location /portainer/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    # Portainer locales (loaded from absolute /locales/ path by Portainer SPA)
    location /locales/ {
        proxy_pass http://127.0.0.1:9000/locales/;
        proxy_set_header Host $host;
    }

}